<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone - Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header with logo and search -->
    <header class="header">
        <div class="header-left">
            <div class="menu-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <a href="index.html" class="logo">
                <span class="logo-icon">▶</span>
                YouTube
            </a>
        </div>
        
        <div class="search-container" id="searchContainer">
            <input type="text" class="search-bar" id="searchInput" placeholder="Search" autocomplete="off">
            <button class="search-button" id="searchBtn">
                <span>🔍</span>
            </button>
            <div class="search-suggestions" id="searchSuggestions"></div>
        </div>
        
        <div class="header-right">
            <span class="upload-icon">📹</span>
            <span class="notification-icon">🔔</span>
            <span class="user-avatar">U</span>
        </div>
    </header>

    <!-- Main layout with sidebar -->
    <div class="main-container">
        <nav class="sidebar" id="sidebar">
            <a href="index.html" class="sidebar-link active">
                <span class="link-icon">🏠</span>
                <span class="link-text">Home</span>
            </a>
            <a href="#" class="sidebar-link">
                <span class="link-icon">🔥</span>
                <span class="link-text">Trending</span>
            </a>
            <a href="#" class="sidebar-link">
                <span class="link-icon">📋</span>
                <span class="link-text">Subscriptions</span>
            </a>
            <hr class="sidebar-divider">
            <a href="#" class="sidebar-link">
                <span class="link-icon">📁</span>
                <span class="link-text">Library</span>
            </a>
            <a href="#" class="sidebar-link">
                <span class="link-icon">🕐</span>
                <span class="link-text">History</span>
            </a>
            <a href="#" class="sidebar-link">
                <span class="link-icon">❤️</span>
                <span class="link-text">Liked Videos</span>
            </a>
        </nav>

        <main class="content">
            <!-- Category filters -->
            <div class="categories">
                <button class="category-btn active">All</button>
                <button class="category-btn">Web Development</button>
                <button class="category-btn">JavaScript</button>
                <button class="category-btn">Python</button>
                <button class="category-btn">CSS</button>
                <button class="category-btn">React</button>
                <button class="category-btn">Tutorials</button>
            </div>

            <!-- Video grid - populated by JavaScript -->
            <div class="video-grid" id="videoGrid"></div>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
