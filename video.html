<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player - YouTube Clone</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="video-page">
    <header class="header">
        <div class="header-left">
            <div class="menu-icon" id="menuToggle" role="button" tabindex="0" aria-label="Toggle sidebar" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <a href="index.html" class="logo">
                <span class="logo-icon">▶</span>
                YouTube
            </a>
        </div>
        
        <div class="search-container">
            <input type="text" class="search-bar" id="searchInput" placeholder="Search">
            <button class="search-button" id="searchBtn">
                <span>🔍</span>
            </button>
        </div>
        
        <div class="header-right">
            <span class="upload-icon">📹</span>
            <span class="notification-icon">🔔</span>
            <span class="user-avatar">U</span>
        </div>
    </header>

    <main class="video-main-container">
        <div class="video-player-section">
            <div class="video-player">
                <iframe 
                    id="videoFrame"
                    width="100%" 
                    height="480" 
                    src="" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>
            
            <div class="video-info">
                <h1 class="video-title" id="videoTitle">Loading...</h1>
                
                <div class="video-stats-row">
                    <span class="video-views" id="videoViews">0 views</span>
                    <span class="video-date" id="videoDate">• Uploaded unknown</span>
                </div>
                
                <div class="video-actions">
                    <div class="action-buttons-left">
                        <button class="action-btn" id="likeBtn">
                            <span class="action-icon">👍</span>
                            <span class="action-text" id="likeCount">Like</span>
                        </button>
                        <button class="action-btn" id="dislikeBtn">
                            <span class="action-icon">👎</span>
                            <span class="action-text">Dislike</span>
                        </button>
                        <button class="action-btn">
                            <span class="action-icon">↗️</span>
                            <span class="action-text">Share</span>
                        </button>
                        <button class="action-btn">
                            <span class="action-icon">➕</span>
                            <span class="action-text">Save</span>
                        </button>
                    </div>
                    <button class="subscribe-btn" id="subscribeBtn">Subscribe</button>
                </div>
                
                <div class="channel-info" id="channelInfo">
                    <div class="channel-avatar" id="channelAvatar">C</div>
                    <div class="channel-details">
                        <h3 class="channel-name" id="channelName">Channel Name</h3>
                        <span class="subscriber-count">1.2M subscribers</span>
                    </div>
                </div>
                
                <div class="video-description" id="videoDescription">
                    <p>Click on a video to start watching. This is a YouTube clone built with HTML, CSS, and JavaScript.</p>
                </div>
            </div>
            
            <div class="comments-section">
                <h3 class="comments-title"><span id="commentCount">5</span> Comments</h3>
                
                <div class="add-comment">
                    <div class="user-avatar comment-avatar">U</div>
                    <input type="text" class="comment-input" placeholder="Add a comment...">
                </div>
                
                <div class="comments-list" id="commentsList"></div>
            </div>
        </div>
        
        <aside class="related-videos">
            <h3 class="related-title">Up Next</h3>
            <div class="related-videos-list" id="relatedVideos"></div>
        </aside>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
